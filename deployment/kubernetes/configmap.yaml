apiVersion: v1
kind: ConfigMap
metadata:
  name: fincrime-config
data:
  APP_ENV: production
  APP_LOG_LEVEL: INFO
  APP_DATA_DIR: /app/data
  APP_MODELS_DIR: /app/data/models
  NEO4J_URI: bolt://neo4j:7687
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  RISK_SCORE_HIGH: "70"
  RISK_SCORE_CRITICAL: "85"
  FRAUD_ANOMALY_THRESHOLD: "0.7"
  GNN_LAYERING_THRESHOLD: "0.6"
---
apiVersion: v1
kind: Secret
metadata:
  name: fincrime-secrets
type: Opaque
stringData:
  API_SECRET_KEY: REPLACE_ME
  NEO4J_PASSWORD: REPLACE_ME
  ETHERSCAN_API_KEY: REPLACE_ME
  PPATK_API_KEY: REPLACE_ME
