global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/alerts/*.yml"

scrape_configs:
  - job_name: fincrime-api
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: fincrime-api
          env: production

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
